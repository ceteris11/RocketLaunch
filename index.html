<!DOCTYPE html>
<!--
  RocketLaunch — entry document
  ────────────────────────────────────────────────────────────────────────────
  Structure only. All styling lives in css/style.css, all game logic in js/.
  Game boots from js/main.js (ES module — requires serving over HTTP, not file://).

  DOM contract (IDs referenced from JS):
    #c                     — main canvas
    #score / #alt / #spd   — HUD text fields
    #fbar                  — fuel bar fill
    #btn-left / #btn-up / #btn-right — on-screen touch controls
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RocketLaunch — 우주 탐험</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="card">
    <div class="lbl">최대 거리 (점수)</div>
    <div class="val" id="score">0 km</div>
  </div>
  <div class="card" style="text-align:center">
    <div class="lbl">현재 고도</div>
    <div class="val" id="alt">0 km</div>
  </div>
  <div class="card" style="text-align:right">
    <div class="lbl">속도</div>
    <div class="val" id="spd">0.00 km/s</div>
    <div class="lbl" style="margin-top:6px">연료</div>
    <div id="fbar-track"><div id="fbar"></div></div>
  </div>
</div>

<div id="hint">← → 방향 전환 &nbsp;|&nbsp; ↑ 가속</div>

<div id="touch-controls">
  <div id="btn-left"  class="touch-btn">◀</div>
  <div id="btn-up"    class="touch-btn">▲</div>
  <div id="btn-right" class="touch-btn">▶</div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
