<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RocketLaunch — 우주 탐험</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; }
    canvas { display:block; }
    #hud {
      position:fixed; top:0; left:0; right:0;
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:14px 18px; pointer-events:none;
    }
    .card {
      background:rgba(0,8,24,0.82);
      border:1px solid rgba(80,180,255,0.3);
      border-radius:8px; padding:10px 14px;
      font-family:'Courier New',monospace; color:#cef; min-width:140px;
    }
    .lbl { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#89d; margin-bottom:3px; }
    .val { font-size:20px; font-weight:bold; color:#fff; }
    #fbar-track { background:rgba(255,255,255,0.15); border-radius:3px; height:5px; margin-top:4px; }
    #fbar { height:5px; border-radius:3px; width:100%; transition:background .3s; }
    #hint {
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
      color:rgba(160,210,255,0.5); font-family:'Courier New',monospace;
      font-size:13px; pointer-events:none; text-align:center;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="card">
    <div class="lbl">최대 거리 (점수)</div>
    <div class="val" id="score">0 km</div>
  </div>
  <div class="card" style="text-align:center">
    <div class="lbl">현재 고도</div>
    <div class="val" id="alt">0 km</div>
  </div>
  <div class="card" style="text-align:right">
    <div class="lbl">속도</div>
    <div class="val" id="spd">0.00 km/s</div>
    <div class="lbl" style="margin-top:6px">연료</div>
    <div id="fbar-track"><div id="fbar"></div></div>
  </div>
</div>
<div id="hint">← → 방향 전환 &nbsp;|&nbsp; ↑ 가속</div>
<script>
'use strict';

// ── Canvas ──────────────────────────────────────────────────────────────────
const C = document.getElementById('c');
const X = C.getContext('2d');
function resize(){ C.width = innerWidth; C.height = innerHeight; }
resize();
addEventListener('resize', resize);

// ── Constants ───────────────────────────────────────────────────────────────
const GM       = 398600;  // Earth gravitational parameter, km³/s²
const Re       = 6371;    // Earth radius, km
// Game-tuned: strong thrust, long fuel for satisfying feel
const THRUST   = 20.0;    // km/s²
const ROT_SPD  = 3;       // deg/frame
const DT       = 5/60;    // physics timestep (5× real-time for snappy feel)
const FUEL_INIT  = 100;
// Fuel lasts 120 real seconds of continuous thrust
const FUEL_DRAIN  = FUEL_INIT / (120 * 60);
const GM_MOON     = 4902.8;          // Moon gravitational parameter, km³/s²
const LAND_SPD    = 3;               // max safe landing speed, km/s
const FUEL_REFILL = FUEL_INIT / (5 * 60); // refuel rate: full in ~5 real seconds

// ── Tiling world-space stars (scroll with rocket movement) ───────────────────
const TILE_KM = 50000; // km — tile repeats every 50,000 km
const TILE_STARS = Array.from({length: 300}, () => ({
  tx: Math.random() * TILE_KM,
  ty: Math.random() * TILE_KM,
  r:  Math.random() * 1.6 + 0.3,
  a:  Math.random() * 0.65 + 0.35,
}));

// ── Moon ────────────────────────────────────────────────────────────────────
const MOON = { x: 0, y: -(Re + 384400), r: 1737 };

// ── Game state ───────────────────────────────────────────────────────────────
let phase = 'title';  // 'title' | 'play' | 'dead'
let fuel, maxAlt, rkt, landedOn;

function spawnRocket() {
  rkt      = { x:0, y:-(Re+10), vx:0, vy:0, angle:0, fire:false };
  fuel     = FUEL_INIT;
  maxAlt   = 0;
  landedOn = null;
}
spawnRocket();

// ── Input ────────────────────────────────────────────────────────────────────
const K = {};
addEventListener('keydown', e => {
  K[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (phase === 'title') phase = 'play';
  if (phase === 'dead' && e.key === ' ') { spawnRocket(); phase = 'play'; }
});
addEventListener('keyup', e => { K[e.key] = false; });

// ── Viewport ─────────────────────────────────────────────────────────────────
function getScale() {
  // Fixed scale: Earth radius = 20% of the shorter screen dimension
  return Math.min(C.width, C.height) * 0.2 / Re;
}

function w2s(wx, wy) {
  const s = getScale();
  return [C.width/2  + (wx - rkt.x) * s,
          C.height/2 + (wy - rkt.y) * s];
}

// ── Physics ───────────────────────────────────────────────────────────────────

// Place rocket on surface, pointing outward
function landOn(planet) {
  const cx = planet === 'moon' ? MOON.x : 0;
  const cy = planet === 'moon' ? MOON.y : 0;
  const pr = planet === 'moon' ? MOON.r  : Re;
  const dx = rkt.x - cx, dy = rkt.y - cy;
  const d  = Math.hypot(dx, dy);
  const nx = dx/d, ny = dy/d;
  rkt.x  = cx + nx * (pr + 0.5);
  rkt.y  = cy + ny * (pr + 0.5);
  rkt.vx = 0; rkt.vy = 0;
  rkt.fire  = false;
  rkt.angle = Math.atan2(ny, nx) * 180 / Math.PI + 90;
  landedOn  = planet;
}

// True if rocket is within ~20° of the base on its planet
function nearBase(planet) {
  if (planet === 'earth') {
    const ny = rkt.y / Math.hypot(rkt.x, rkt.y);
    return ny < -0.94;  // top of Earth (facing Moon)
  }
  const dy = rkt.y - MOON.y;
  const d  = Math.hypot(rkt.x - MOON.x, dy);
  return (dy / d) > 0.94; // Earth-facing side of Moon
}

function update() {
  if (phase !== 'play') return;

  // ── Landed state ──
  if (landedOn) {
    if (nearBase(landedOn) && fuel < FUEL_INIT)
      fuel = Math.min(FUEL_INIT, fuel + FUEL_REFILL);
    if (K['ArrowUp'] && fuel > 0) {
      const cx = landedOn === 'moon' ? MOON.x : 0;
      const cy = landedOn === 'moon' ? MOON.y : 0;
      const dx = rkt.x - cx, dy = rkt.y - cy, d = Math.hypot(dx, dy);
      rkt.vx = dx/d * 2; rkt.vy = dy/d * 2;
      landedOn = null;
    }
    return;
  }

  // ── Flight ──
  if (K['ArrowLeft'])  rkt.angle -= ROT_SPD;
  if (K['ArrowRight']) rkt.angle += ROT_SPD;

  rkt.fire = K['ArrowUp'] && fuel > 0;
  if (rkt.fire) {
    const rad = (rkt.angle - 90) * Math.PI / 180;
    rkt.vx += Math.cos(rad) * THRUST * DT;
    rkt.vy += Math.sin(rad) * THRUST * DT;
    fuel = Math.max(0, fuel - FUEL_DRAIN);
  }

  // Earth gravity
  const r  = Math.hypot(rkt.x, rkt.y);
  rkt.vx  -= (rkt.x / r) * GM       / (r * r) * DT;
  rkt.vy  -= (rkt.y / r) * GM       / (r * r) * DT;

  // Moon gravity
  const mdx = rkt.x - MOON.x, mdy = rkt.y - MOON.y;
  const mr  = Math.hypot(mdx, mdy);
  rkt.vx   -= (mdx / mr) * GM_MOON  / (mr* mr) * DT;
  rkt.vy   -= (mdy / mr) * GM_MOON  / (mr* mr) * DT;

  rkt.x += rkt.vx * DT;
  rkt.y += rkt.vy * DT;

  // Collision — recompute distances after move
  const earthDist = Math.hypot(rkt.x, rkt.y);
  const moonDist  = Math.hypot(rkt.x - MOON.x, rkt.y - MOON.y);

  if (earthDist < Re) {
    if (Math.hypot(rkt.vx, rkt.vy) > LAND_SPD) { phase = 'dead'; return; }
    landOn('earth'); return;
  }
  if (moonDist < MOON.r) {
    if (Math.hypot(rkt.vx, rkt.vy) > LAND_SPD) { phase = 'dead'; return; }
    landOn('moon'); return;
  }

  maxAlt = Math.max(maxAlt, earthDist - Re);
}

// ── Draw: background ─────────────────────────────────────────────────────────
function drawBg() {
  X.fillStyle = '#00000d';
  X.fillRect(0, 0, C.width, C.height);
}

// Tiling star field — stars scroll 1:1 with rocket movement
function drawScrollStars() {
  const s      = getScale();
  const tilePx = TILE_KM * s;

  // Rocket's fractional position within current tile
  const ox = ((rkt.x % TILE_KM) + TILE_KM) % TILE_KM;
  const oy = ((rkt.y % TILE_KM) + TILE_KM) % TILE_KM;

  const cols = Math.ceil(C.width  / tilePx) + 2;
  const rows = Math.ceil(C.height / tilePx) + 2;

  for (const st of TILE_STARS) {
    const bx = C.width/2  + (st.tx - ox) * s;
    const by = C.height/2 + (st.ty - oy) * s;
    const i0 = Math.floor(-bx / tilePx);
    const j0 = Math.floor(-by / tilePx);

    for (let i = i0; i <= i0 + cols; i++) {
      for (let j = j0; j <= j0 + rows; j++) {
        const px = bx + i * tilePx;
        const py = by + j * tilePx;
        if (px < -2 || px > C.width+2 || py < -2 || py > C.height+2) continue;
        X.beginPath();
        X.arc(px, py, st.r, 0, Math.PI*2);
        X.fillStyle = `rgba(255,255,255,${st.a})`;
        X.fill();
      }
    }
  }
}

// ── Draw: Earth ───────────────────────────────────────────────────────────────
function drawEarth() {
  const s = getScale();
  const [ex, ey] = w2s(0, 0);
  const er = Re * s;

  if (er > 1) {
    const atm = X.createRadialGradient(ex,ey,er*.87,ex,ey,er*1.42);
    atm.addColorStop(0,   'rgba(80,170,255,.22)');
    atm.addColorStop(.55, 'rgba(20,60,200,.07)');
    atm.addColorStop(1,   'transparent');
    X.beginPath(); X.arc(ex, ey, er*1.42, 0, Math.PI*2);
    X.fillStyle = atm; X.fill();
  }

  const o = X.createRadialGradient(ex-er*.28,ey-er*.28,0,ex,ey,er);
  o.addColorStop(0,   '#5ab4ff');
  o.addColorStop(.45, '#1e62b5');
  o.addColorStop(1,   '#0a2d5e');
  X.beginPath(); X.arc(ex, ey, Math.max(er, 2), 0, Math.PI*2);
  X.fillStyle = o; X.fill();

  if (er > 12) {
    X.save(); X.beginPath(); X.arc(ex,ey,er,0,Math.PI*2); X.clip();
    X.fillStyle = 'rgba(60,165,60,.65)';
    [[-0.22,-0.35,.24,.30,.5],[.14,.10,.28,.20,.3],[-.40,.22,.16,.11,.4],
     [.38,-.16,.19,.14,-.3],[.05,-.56,.13,.08,.2]].forEach(([cx,cy,rx,ry,rot]) => {
      X.beginPath(); X.ellipse(ex+cx*er,ey+cy*er,rx*er,ry*er,rot,0,Math.PI*2); X.fill();
    });
    X.restore();
  }
}

// ── Draw: Moon ────────────────────────────────────────────────────────────────
function drawMoon() {
  const s = getScale();
  const [mx, my] = w2s(MOON.x, MOON.y);
  const mr = Math.max(MOON.r * s, 2);
  if (mx < -mr-50 || mx > C.width+mr+50 || my < -mr-50 || my > C.height+mr+50) return;

  const g = X.createRadialGradient(mx-mr*.3,my-mr*.3,0,mx,my,mr);
  g.addColorStop(0, '#e8e8e8');
  g.addColorStop(.6, '#b0b0b0');
  g.addColorStop(1, '#606060');
  X.beginPath(); X.arc(mx, my, mr, 0, Math.PI*2);
  X.fillStyle = g; X.fill();
}

// ── Draw: Landing bases ───────────────────────────────────────────────────────
function drawBase(wx, wy, nx, ny, color) {
  const [sx, sy] = w2s(wx, wy);
  if (Math.abs(sx - C.width/2)  > C.width  + 60) return;
  if (Math.abs(sy - C.height/2) > C.height + 60) return;

  // Rotate pad to lie tangent to surface (local -y = away from planet)
  const angle = Math.atan2(nx, -ny);
  X.save();
  X.translate(sx, sy);
  X.rotate(angle);

  // Base structure
  X.fillStyle = '#444';
  X.fillRect(-22, -5, 44, 5);
  // Landing strip
  X.fillStyle = color;
  X.fillRect(-18, -8, 36, 3);
  // Beacon lights
  X.fillStyle = '#ff0';
  X.beginPath(); X.arc(-16, -11, 3, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc( 16, -11, 3, 0, Math.PI*2); X.fill();
  // Label
  X.fillStyle = '#fff';
  X.font = 'bold 9px monospace';
  X.textAlign = 'center';
  X.fillText('기지', 0, -17);

  X.restore();
}

function drawBases() {
  // Earth base: top of Earth, normal = (0, -1)
  drawBase(0, -Re, 0, -1, '#4af');
  // Moon base: Earth-facing side, normal = (0, +1) from Moon center
  drawBase(MOON.x, MOON.y + MOON.r, 0, 1, '#fa4');
}

// ── Draw: Rocket ──────────────────────────────────────────────────────────────
function drawRocket() {
  const [rx, ry] = w2s(rkt.x, rkt.y);
  X.save();
  X.translate(rx, ry);
  X.rotate(rkt.angle * Math.PI / 180);

  if (rkt.fire) {
    const fl = 18 + Math.random() * 18;
    const fg = X.createLinearGradient(0, 15, 0, 15+fl);
    fg.addColorStop(0,   'rgba(255,230,70,1)');
    fg.addColorStop(.45, 'rgba(255,110,20,.85)');
    fg.addColorStop(1,   'rgba(255,30,0,0)');
    X.beginPath();
    X.moveTo(-5,15); X.lineTo(5,15); X.lineTo(3,15+fl); X.lineTo(-3,15+fl);
    X.closePath(); X.fillStyle = fg; X.fill();
  }

  X.beginPath(); X.moveTo(0,-22); X.lineTo(-7,14); X.lineTo(7,14); X.closePath();
  X.fillStyle = '#d8d8d8'; X.fill();
  X.strokeStyle = '#aaa'; X.lineWidth = 0.8; X.stroke();

  X.beginPath(); X.moveTo(0,-22); X.lineTo(-5,-8); X.lineTo(5,-8); X.closePath();
  X.fillStyle = '#e84040'; X.fill();

  X.fillStyle = '#e07830';
  X.beginPath(); X.moveTo(-7,14); X.lineTo(-15,22); X.lineTo(-7,2); X.closePath(); X.fill();
  X.beginPath(); X.moveTo(7,14);  X.lineTo(15,22);  X.lineTo(7,2);  X.closePath(); X.fill();

  X.beginPath(); X.arc(0,-4,4,0,Math.PI*2);
  X.fillStyle = '#a8eeff'; X.fill();
  X.strokeStyle = '#888'; X.lineWidth = 1; X.stroke();

  X.restore();
}

// ── Draw: Direction indicator (arrow toward Earth or Moon) ────────────────────
function drawDirIndicator(worldX, worldY, label, color) {
  const [sx, sy] = w2s(worldX, worldY);
  const cx = C.width / 2, cy = C.height / 2;

  // Angle on screen from center toward the target
  const angle = Math.atan2(sy - cy, sx - cx);

  // Indicator sits on a ring at 82% of the smaller screen half
  const R  = Math.min(cx, cy) * 0.82;
  const ax = cx + Math.cos(angle) * R;
  const ay = cy + Math.sin(angle) * R;

  // Fade out when the target itself is clearly on screen
  const onScreen = sx > 60 && sx < C.width-60 && sy > 60 && sy < C.height-60;

  const dist  = Math.hypot(worldX - rkt.x, worldY - rkt.y);
  const dStr  = dist >= 1e6 ? (dist/1e6).toFixed(1)+'M km'
              : dist >= 1000 ? Math.round(dist/1000)+'k km'
              : Math.round(dist)+' km';

  X.save();
  X.globalAlpha = onScreen ? 0.28 : 0.88;

  // Arrow head pointing toward the target (rotate right-pointing arrow by `angle`)
  X.save();
  X.translate(ax, ay);
  X.rotate(angle);
  X.fillStyle = color;
  X.beginPath();
  X.moveTo(18, 0);
  X.lineTo(-3, -9);
  X.lineTo(-3,  9);
  X.closePath();
  X.fill();
  X.restore();

  // Label above, distance below (unrotated, always readable)
  X.fillStyle = color;
  X.textAlign = 'center';
  X.font = 'bold 11px "Courier New",monospace';
  X.fillText(label, ax, ay - 20);
  X.font = '10px "Courier New",monospace';
  X.fillText(dStr, ax, ay + 23);

  X.restore();
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD() {
  const dist = Math.hypot(rkt.x, rkt.y);
  const alt  = Math.max(0, dist - Re);
  const spd  = Math.hypot(rkt.vx, rkt.vy);
  const fmt  = n => Math.floor(n).toLocaleString('ko-KR');

  document.getElementById('score').textContent = fmt(maxAlt) + ' km';
  document.getElementById('alt').textContent   = fmt(alt)   + ' km';
  document.getElementById('spd').textContent   = spd.toFixed(2) + ' km/s';

  const fb = document.getElementById('fbar');
  fb.style.width      = fuel + '%';
  fb.style.background = fuel > 50 ? '#4c4' : fuel > 20 ? '#fa0' : '#f44';
}

// ── Overlay ───────────────────────────────────────────────────────────────────
function overlay(t1, t2, t3, hint) {
  X.fillStyle = 'rgba(0,0,12,.65)';
  X.fillRect(0, 0, C.width, C.height);

  const cx = C.width/2, cy = C.height/2;
  X.textAlign = 'center';

  X.font = 'bold 40px "Courier New",monospace';
  X.fillStyle = '#fff';
  X.fillText(t1, cx, cy - 75);

  if (t2) { X.font = '21px "Courier New",monospace'; X.fillStyle = '#9df'; X.fillText(t2, cx, cy - 18); }
  if (t3) { X.font = '17px "Courier New",monospace'; X.fillStyle = '#8cf'; X.fillText(t3, cx, cy + 22); }
  if (hint && Math.floor(Date.now()/600) % 2) {
    X.font = 'bold 17px "Courier New",monospace'; X.fillStyle = '#ff0';
    X.fillText(hint, cx, cy + 78);
  }
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop() {
  update();

  drawBg();
  drawScrollStars();
  drawMoon();
  drawEarth();
  drawBases();
  drawRocket();

  // Direction indicators — always shown on top
  drawDirIndicator(0, 0, '지구', '#4af');
  drawDirIndicator(MOON.x, MOON.y, '달', '#ccc');

  drawHUD();

  // Landing status banner
  if (landedOn && phase === 'play') {
    const atB = nearBase(landedOn);
    const refueling = atB && fuel < FUEL_INIT;
    const msg = refueling         ? '⛽  연료 충전 중...'
              : atB               ? '✅  기지 — 연료 충전 완료'
              : landedOn==='moon' ? '🌙  달 착륙'
                                  : '🌍  지구 착륙';
    X.save();
    X.fillStyle = 'rgba(0,10,30,0.8)';
    X.fillRect(C.width/2 - 210, C.height - 82, 420, 58);
    X.textAlign = 'center';
    X.font = 'bold 18px "Courier New",monospace';
    X.fillStyle = refueling ? '#fa0' : '#4f4';
    X.fillText(msg, C.width/2, C.height - 52);
    X.font = '12px "Courier New",monospace';
    X.fillStyle = 'rgba(180,210,255,0.7)';
    X.fillText('↑ 키를 눌러 이륙', C.width/2, C.height - 32);
    X.restore();
  }

  if (phase === 'title') {
    overlay(
      '🚀  ROCKET LAUNCH',
      '지구에서 로켓을 쏴 우주를 탐험하세요!',
      '↑ 가속 (연료 소모)   ← → 방향 전환',
      '아무 키나 눌러 시작'
    );
  }
  if (phase === 'dead') {
    overlay(
      '💥  충돌!',
      '최대 거리: ' + Math.floor(maxAlt).toLocaleString('ko-KR') + ' km',
      '너무 빠른 속도로 지면에 충돌했습니다',
      'SPACE 키로 다시 시작'
    );
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
